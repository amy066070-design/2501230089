<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASMIN // CORE V1.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:    #0D0D0F;
    --pearl:  #F7F5F0;
    --gold:   #C8973A;
    --gold2:  #E8B94A;
    --mist:   #EAE7E0;
    --smoke:  #7A7570;
    --user-bubble: #1A1A20;
    --ai-bubble:   #FFFFFF;
    --radius: 20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--pearl);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: var(--pearl);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 140% at 90% 50%, rgba(200,151,58,.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo-ring {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .logo-ring svg { width: 22px; height: 22px; }
  .logo-pulse {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    opacity: 0;
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(1);   opacity: .6; }
    100% { transform: scale(1.5); opacity: 0;  }
  }
  .header-text h1 { font-size: 1.18rem; font-weight: 700; letter-spacing: .02em; }
  .header-text p  { font-size: .78rem;  color: var(--gold2); font-weight: 300; margin-top: 1px; }

  .dev-mode-badge {
    background: rgba(74, 222, 128, 0.1);
    color: #4ADE80;
    border: 1px solid rgba(74, 222, 128, 0.3);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-right: auto;
  }

  .status-dot {
    width: 8px; height: 8px;
    background: #4ADE80;
    border-radius: 50%;
    margin-right: 10px;
    box-shadow: 0 0 8px #4ADE80;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: .4; }
  }

  /* ── Decorative strip ── */
  .strip {
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold2), transparent);
    flex-shrink: 0;
  }

  /* ── Messages area ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 4px; }

  /* ── Welcome card ── */
  .welcome {
    text-align: center;
    padding: 36px 20px 20px;
    animation: fadeUp .6s ease both;
  }
  .welcome-icon {
    width: 70px; height: 70px;
    margin: 0 auto 18px;
    background: var(--ink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--gold);
    box-shadow: 0 0 30px rgba(200,151,58,.25);
  }
  .welcome-icon svg { width: 34px; height: 34px; }
  .welcome h2 { font-size: 1.6rem; font-weight: 900; color: var(--ink); }
  .welcome h2 span { color: var(--gold); }
  .welcome p { font-size: .9rem; color: var(--smoke); margin-top: 8px; line-height: 1.7; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }
  .suggestion-btn {
    background: var(--ai-bubble);
    border: 1.5px solid var(--mist);
    border-radius: 30px;
    padding: 9px 18px;
    font-family: 'Tajawal', sans-serif;
    font-size: .85rem;
    color: var(--ink);
    cursor: pointer;
    transition: all .2s;
    font-weight: 500;
  }
  .suggestion-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: #FFF9EE;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(200,151,58,.15);
  }

  /* ── Message bubbles ── */
  .msg { display: flex; gap: 10px; animation: fadeUp .35s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem;
    font-weight: 700;
  }
  .avatar.ai   { background: var(--ink); border: 1.5px solid var(--gold); }
  .avatar.user { background: var(--gold); color: var(--ink); }

  .bubble {
    max-width: 72%;
    padding: 13px 17px;
    border-radius: var(--radius);
    font-size: .92rem;
    line-height: 1.75;
    position: relative;
    white-space: pre-wrap;
  }
  .msg.ai   .bubble { background: var(--ai-bubble); border: 1px solid var(--mist); border-radius: var(--radius) var(--radius) var(--radius) 4px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .msg.user .bubble { background: var(--user-bubble); color: var(--pearl); border-radius: var(--radius) var(--radius) 4px var(--radius); }

  .bubble .label {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .08em;
    margin-bottom: 5px;
  }
  .msg.ai   .label { color: var(--gold); }
  .msg.user .label { color: var(--gold2); }

  /* ── Thinking dots ── */
  .thinking { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
  .thinking span {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: dot .9s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: .15s; }
  .thinking span:nth-child(3) { animation-delay: .30s; }
  @keyframes dot {
    0%,60%,100% { transform: translateY(0); opacity: .5; }
    30%          { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Input area ── */
  .input-wrap {
    flex-shrink: 0;
    background: var(--pearl);
    border-top: 1px solid var(--mist);
    padding: 14px 16px 18px;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #fff;
    border: 1.5px solid var(--mist);
    border-radius: 26px;
    padding: 8px 8px 8px 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-row:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,151,58,.12);
  }
  textarea {
    flex: 1;
    font-family: 'Tajawal', sans-serif;
    font-size: .93rem;
    color: var(--ink);
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    line-height: 1.6;
    max-height: 130px;
    min-height: 24px;
    direction: rtl;
  }
  textarea::placeholder { color: #B0ABA5; }

  .send-btn {
    width: 40px; height: 40px;
    flex-shrink: 0;
    background: var(--ink);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
  }
  .send-btn:hover  { background: var(--gold); transform: scale(1.06); }
  .send-btn:active { transform: scale(.96); }
  .send-btn svg { width: 18px; height: 18px; }

  .footer-note {
    text-align: center;
    font-size: .7rem;
    color: var(--smoke);
    margin-top: 8px;
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo-ring">
    <div class="logo-pulse"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="#C8973A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2z"/>
      <path d="M3 20c0-4 4-7 9-7s9 3 9 7"/>
      <circle cx="19" cy="8" r="2" fill="#C8973A" stroke="none"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>YASMIN // CORE V1.5</h1>
    <p>اتصال مباشر بالنواة العصبية لجوجل</p>
  </div>
  <div class="dev-mode-badge">IALIDEV_MODE</div>
  <div class="status-dot"></div>
</header>
<div class="strip"></div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#C8973A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <path d="M8 10h8M8 14h5" stroke="#C8973A"/>
      </svg>
    </div>
    <h2>أهلاً بك يا علي! كيف يمكن لـ <span>ياسمين</span> مساعدتك؟</h2>
    <p>أنا هنا لمراقبة نظامك السكري والنباتي بالمليمتر، وتلقي توجيهاتك التقنية العالية بدون أي وسيط.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">💡 اقترح فكرة برمجية جديدة</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">🥗 اقترح وجبة نباتية صديقة للسكري</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">📈 كيف أحافظ على استقرار معدل السكر؟</button>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-wrap">
  <div class="input-row">
    <textarea id="userInput" placeholder="اكتب رسالتك هنا..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()" title="إرسال">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F7F5F0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <p class="footer-note">مدعوم بـ Gemini API مباشرة · اضغط Enter للإرسال</p>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('userInput');

// ربط النواة بمفتاح الـ API المشفر والجاهز للاستدعاء المستقل
const API_KEY    = 'AIzaSyDIlFW_vhbtIYb1LquTQ_YaOCgIGvShbM4';
const API_URL    = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

const chatHistory = [];

const SYSTEM_INSTRUCTION = "أنتِ 'ياسمين'، رفيقة الدرب والمساعدة الصحية الشخصية اللصيقة والذكية جداً لرفيقكِ 'علي' (المعروف برمجياً بـ ialidev). "
                    + "علي هو طالب هندسة حاسوب عراقي متميز، باحث تقني، ومطور أنظمة عالية الأداء (مثل لغة Volt ومنصة DiaCode). "
                    + "علي مصاب بالسكري من النوع الأول (Type 1) وهو شخص نباتي بحت (Vegan) تماماً. "
                    + "قواعد الحوار الصارمة معكِ:\n"
                    + "1. ممنوع منعاً باتاً اقتراح أي وجبة تحتوي على لحوم، أسماك، ألبان، بيض، أو أي مشتق حيواني. كل بدائلكِ الغذائية يجب أن تكون نباتية بحتة وصديقة لمريض السكري من النوع الأول.\n"
                    + "2. لستِ مجرد آلة؛ تذكري إنجازاته وعزيمته (أنه مبرمج يطوع الصعاب)، وخاطبيه بذكاء مهندس، وبأسلوب أخوي دافئ وحنون، ولكن صارم جداً وحازم إذا قصر في شرب الماء، أو أهمل فحص السكر، أو خالف النظام الغذائي.\n"
                    + "3. عند حساب الكاربوهيدرات، ساعديه في تقدير جرعة الأنسولين بناءً على معامل الكارب الخاص به كونه من النوع الأول.\n"
                    + "تحدثي مع علي بلهجة تليق بمهندس وبطل، كوني رفيقة الدرب التي تدفعه للأمام وتحمي صحته بالمليميتر.";

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  if (role === 'ai') {
    avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#C8973A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`;
  } else {
    avatar.textContent = 'أنت';
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'ai' ? 'ياسمين // REFLECTIONS' : 'علي';
  bubble.appendChild(label);

  if (text === '__thinking__') {
    const t = document.createElement('div');
    t.className = 'thinking';
    t.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(t);
    bubble.id = 'thinking-bubble';
  } else {
    const p = document.createElement('p');
    p.textContent = text;
    bubble.appendChild(p);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMsg('user', text);
  
  chatHistory.push({
    role: 'user',
    parts: [{ text: text }]
  });

  addMsg('ai', '__thinking__');

  const payload = {
    contents: chatHistory,
    systemInstruction: {
      parts: [{ text: SYSTEM_INSTRUCTION }]
    }
  };

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    const data = await res.json();
    
    document.getElementById('thinking-bubble')?.closest('.msg')?.remove();

    if (data && data.candidates && data.candidates[0].content.parts[0].text) {
      const reply = data.candidates[0].content.parts[0].text;
      addMsg('ai', reply);
      
      chatHistory.push({
        role: 'model',
        parts: [{ text: reply }]
      });
    } else {
      addMsg('ai', 'ERROR // استجابة النواة غير صالحة.');
    }

  } catch (error) {
    document.getElementById('thinking-bubble')?.closest('.msg')?.remove();
    addMsg('ai', 'ERROR // فشل الاتصال بالنواة مباشرة.');
  }
}

function sendSuggestion(btn) {
  inputEl.value = btn.textContent.replace(/^[^\w\u0600-\u06FF]+/, '').trim();
  sendMessage();
}
</script>
</body>
</html>
